services:

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/regimenbank.db
    volumes:
      - db_data:/data          # persistent database — survives container restarts
    ports:
      - "8000:8000"            # optional: expose for direct API access / debugging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        # Uses Docker's internal DNS — frontend container talks to backend container
        # directly without going through the host network
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:       # named volume — Docker manages storage, data persists across restarts
